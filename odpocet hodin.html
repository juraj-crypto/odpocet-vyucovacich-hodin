<div id="zvonenie-container" style="font-family: 'Segoe UI', Arial, sans-serif; font-weight: bold; text-align: center; background: rgba(0, 0, 0, 0.75); padding: 20px 30px; border-radius: 15px; border: 2px solid #444; width: max-content; margin: 0 auto; box-shadow: 0px 10px 20px rgba(0,0,0,0.5);">
  <div id="aktualny-stav" style="font-size: 28px; color: #4fc3f7; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px;">Načítavam...</div>
  <div id="odpocet" style="font-size: 55px; color: #ffffff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">--:--</div>
</div>

<script>
// SEM SI UPRAVTE VÁŠ PRESNÝ ROZVRH ZVONENIA A NÁZVY (časy musia byť vo formáte HH:MM)
const harmonogram = [
  { nazov: "1. hodina", zaciatok: "07:50", koniec: "08:35" },
  { nazov: "Prestávka", zaciatok: "08:35", koniec: "08:45" },
  { nazov: "2. hodina", zaciatok: "08:45", koniec: "09:30" },
  { nazov: "Veľká prestávka", zaciatok: "09:30", koniec: "09:50" },
  { nazov: "3. hodina", zaciatok: "09:50", koniec: "10:35" },
  { nazov: "Prestávka", zaciatok: "10:35", koniec: "10:45" },
  { nazov: "4. hodina", zaciatok: "10:45", koniec: "11:30" },
  { nazov: "Prestávka", zaciatok: "11:30", koniec: "11:35" },
  { nazov: "5. hodina", zaciatok: "11:35", koniec: "12:20" },
  { nazov: "Prestávka", zaciatok: "12:20", koniec: "12:30" },
  { nazov: "6. hodina", zaciatok: "12:30", koniec: "13:15" },
  { nazov: "Prestávka", zaciatok: "13:15", koniec: "13:45" },
  { nazov: "7. hodina", zaciatok: "13:45", koniec: "14:30" }
];

function casNaMinuty(casStr) {
  const [h, m] = casStr.split(':');
  return parseInt(h, 10) * 60 + parseInt(m, 10);
}

function updateTimer() {
  const teraz = new Date();
  const minutyDnes = teraz.getHours() * 60 + teraz.getMinutes();
  
  const stavElement = document.getElementById("aktualny-stav");
  const odpocetElement = document.getElementById("odpocet");

  let aktualnyBlok = null;

  // Zistenie, v akom bloku sa aktuálne nachádzame
  for (let i = 0; i < harmonogram.length; i++) {
    const zac = casNaMinuty(harmonogram[i].zaciatok);
    const kon = casNaMinuty(harmonogram[i].koniec);

    if (minutyDnes >= zac && minutyDnes < kon) {
      aktualnyBlok = harmonogram[i];
      break;
    }
  }

  if (aktualnyBlok) {
    // Sme počas hodiny alebo prestávky
    stavElement.innerHTML = "Prebieha: " + aktualnyBlok.nazov;
    
    const konDate = new Date();
    const [h, m] = aktualnyBlok.koniec.split(':');
    konDate.setHours(h, m, 0, 0);
    
    const rozdiel = Math.floor((konDate - teraz) / 1000);
    const mLeft = Math.floor(rozdiel / 60);
    const sLeft = rozdiel % 60;
    
    // Formátovanie sekúnd, aby mali vždy dve nuly (napr. 05s namiesto 5s)
    const sFormatted = sLeft.toString().padStart(2, '0');
    
    odpocetElement.innerHTML = mLeft + "m " + sFormatted + "s";
    odpocetElement.style.color = "#ffffff";
    stavElement.style.color = "#4fc3f7"; // Modrá farba pre prebiehajúci stav

  } else {
    // Sme pred vyučovaním alebo po ňom
    const prvyZac = casNaMinuty(harmonogram[0].zaciatok);
    const poslednyKon = casNaMinuty(harmonogram[harmonogram.length - 1].koniec);

    if (minutyDnes < prvyZac) {
      stavElement.innerHTML = "Pred vyučovaním";
      stavElement.style.color = "#a5d6a7"; // Zelená farba
      
      const zacDate = new Date();
      const [h, m] = harmonogram[0].zaciatok.split(':');
      zacDate.setHours(h, m, 0, 0);
      
      const rozdiel = Math.floor((zacDate - teraz) / 1000);
      const mLeft = Math.floor(rozdiel / 60);
      const sLeft = rozdiel % 60;
      const sFormatted = sLeft.toString().padStart(2, '0');
      
      odpocetElement.innerHTML = mLeft + "m " + sFormatted + "s";
    } else if (minutyDnes >= poslednyKon) {
      stavElement.innerHTML = "Po vyučovaní";
      stavElement.style.color = "#a5d6a7"; // Zelená farba
      odpocetElement.innerHTML = "Zatvorené";
      odpocetElement.style.color = "#888888";
    }
  }
}

// Aktualizácia každú sekundu
setInterval(updateTimer, 1000);
updateTimer();
</script>
